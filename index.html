<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><title>PO Assistant V4 Simple</title>
<style>
body{margin:0;font-family:Arial;background:#f4f7fb;color:#1f2937}header{background:linear-gradient(135deg,#1f4e79,#2f80ed);color:white;padding:18px 24px;display:flex;justify-content:space-between}button{background:#1f4e79;color:white;border:0;border-radius:8px;padding:10px 12px;font-weight:bold;cursor:pointer;margin:3px}.light{background:white;color:#1f4e79;border:1px solid #d9e2ef}.danger{background:#dc2626}input,textarea,select{width:100%;padding:9px;border:1px solid #d9e2ef;border-radius:8px;margin:6px 0 10px;font-family:Arial}textarea{min-height:90px}.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 74px)}aside{background:white;border-right:1px solid #d9e2ef;padding:15px}main{padding:18px}.card{background:white;border-radius:14px;padding:15px;margin-bottom:14px;box-shadow:0 2px 8px #0001}.topic,.item{border:1px solid #d9e2ef;border-radius:10px;padding:11px;margin:8px 0;background:white;cursor:pointer}.topic.active,.topic:hover,.item:hover{background:#eaf3ff;border-color:#2f80ed}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}.kpi{background:white;border:1px solid #d9e2ef;border-radius:10px;padding:12px}.kpi b{font-size:24px;color:#1f4e79}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{background:white;color:#1f4e79;border:1px solid #d9e2ef}.tab.active{background:#1f4e79;color:white}.panel{display:none}.panel.active{display:block}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border:1px solid #d9e2ef;padding:8px;vertical-align:top}th{background:#edf4ff;color:#1f4e79}.modal{position:fixed;inset:0;background:#0006;padding:25px;overflow:auto}.modal-card{background:white;border-radius:14px;max-width:950px;margin:auto;padding:18px}.hidden{display:none}.note{background:#fffbea;border:1px solid #facc15;border-radius:10px;padding:10px;margin:10px 0}@media(max-width:850px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div><h2>PO Assistant V4 Simple</h2><small>Sujets · synthèse · CR · ADR · décisions · actions · risques</small></div><button class="light" onclick="openAdd()">+ Ajouter JSON</button></header>
<div class="layout"><aside><button onclick="newTopic()">+ Sujet</button><button class="light" onclick="exportData()">Exporter</button><label><span class="light" style="display:inline-block;padding:10px 12px;border-radius:8px;cursor:pointer">Importer</span><input type="file" accept=".json" onchange="importData(event)" style="display:none"></label><hr><input id="topicSearch" placeholder="Rechercher sujet..." oninput="renderTopics()"><div id="topics"></div><div class="note">Sauvegarde locale navigateur. Exporte régulièrement.</div></aside><main>
<div class="card"><h2 id="subjectTitle"></h2><p id="subjectSummary"></p><button onclick="editSubjectSummary()">Modifier synthèse</button><button onclick="openManual()">+ Ajouter CR manuel</button></div>
<div class="grid"><div class="kpi"><b id="kCr">0</b><br>CR</div><div class="kpi"><b id="kAdr">0</b><br>ADR</div><div class="kpi"><b id="kDecision">0</b><br>Décisions</div><div class="kpi"><b id="kAction">0</b><br>Actions</div><div class="kpi"><b id="kRisk">0</b><br>Risques</div></div>
<div class="tabs"><button class="tab active" onclick="tab('summary',this)">Synthèse</button><button class="tab" onclick="tab('cr',this)">Comptes rendus</button><button class="tab" onclick="tab('adr',this)">ADR</button><button class="tab" onclick="tab('decisions',this)">Décisions</button><button class="tab" onclick="tab('actions',this)">Actions</button><button class="tab" onclick="tab('risks',this)">Risques</button><button class="tab" onclick="tab('search',this)">Recherche</button></div>
<section id="summary" class="panel active card"><h2>Synthèse du sujet</h2><div id="summaryContent"></div></section><section id="cr" class="panel card"><h2>Comptes rendus</h2><div id="crList"></div></section><section id="adr" class="panel card"><h2>ADR</h2><div id="adrList"></div></section><section id="decisions" class="panel card"><h2>Décisions</h2><div id="decisionTable"></div></section><section id="actions" class="panel card"><h2>Actions</h2><div id="actionTable"></div></section><section id="risks" class="panel card"><h2>Risques</h2><div id="riskTable"></div></section><section id="search" class="panel card"><h2>Recherche</h2><input id="searchInput" placeholder="Mot-clé..." oninput="renderSearch()"><div id="searchResults"></div></section>
</main></div>
<div id="addModal" class="modal hidden"><div class="modal-card"><h2>Ajouter un élément JSON</h2><label>Type</label><select id="jsonType"><option value="cr">Compte rendu</option><option value="adr">ADR</option></select><textarea id="jsonBox" style="min-height:280px" placeholder="Colle ici le JSON..."></textarea><button onclick="addJson()">Ajouter</button><button class="light" onclick="closeAdd()">Annuler</button></div></div>
<div id="editModal" class="modal hidden"><div class="modal-card"><h2>Modifier</h2><input id="eTitle" placeholder="Titre"><input id="eDate" placeholder="Date"><input id="eParticipants" placeholder="Participants, séparés par virgule"><textarea id="eSummary" placeholder="Objectif / synthèse"></textarea><textarea id="eCR" placeholder="Compte rendu"></textarea><textarea id="eDecisions" placeholder="Décisions, une par ligne"></textarea><textarea id="eActions" placeholder="Actions, une par ligne"></textarea><textarea id="eRisks" placeholder="Risques, un par ligne"></textarea><button onclick="saveEdit()">Enregistrer</button><button class="danger" onclick="deleteEdit()">Supprimer</button><button class="light" onclick="closeEdit()">Annuler</button></div></div>
<script>
const initial={subjects:[{id:"traductions",name:"Gestion des traductions",summary:"Automatiser la gestion et la diffusion des traductions dans le portail modulaire.",cr:[],adr:[]},{id:"modules",name:"Définition d'un module",summary:"Définir les critères de création et de découpage des modules dans le portail modulaire.",cr:[],adr:[]},{id:"tracabilite",name:"Traçabilité / EDI",summary:"Capitaliser les décisions liées à la traçabilité, INCO, EDI et WMS.",cr:[],adr:[]}]};
let data=JSON.parse(localStorage.getItem("po_assistant_v4_simple")||localStorage.getItem("adr_po_assistant_v3")||JSON.stringify(initial));data=migrate(data);let current=data.subjects[0]?.id;let edit={type:null,index:null};
function migrate(d){if(d.topics){return{subjects:d.topics.map(t=>({id:t.id,name:t.name,summary:t.description||"",cr:[],adr:(t.adrs||t.meetings||[]).map(norm)}))}}return d}
function save(){localStorage.setItem("po_assistant_v4_simple",JSON.stringify(data))}function subject(){return data.subjects.find(s=>s.id===current)||data.subjects[0]}
function norm(x){return{titre:x.titre||x.title||"Sans titre",date:x.date||"",participants:Array.isArray(x.participants)?x.participants:(x.participants?String(x.participants).split(",").map(a=>a.trim()):[]),objectif:x.objectif||"",pointsAbordes:x.pointsAbordes||[],compteRendu:x.compteRendu||x.cr||x.synthese||"",decisions:x.decisions||[],actions:x.actions||[],risques:x.risques||x.risks||[]}}
function render(){renderTopics();renderMain();renderSearch()}
function renderTopics(){let q=(topicSearch.value||"").toLowerCase();topics.innerHTML=data.subjects.filter(s=>s.name.toLowerCase().includes(q)).map(s=>`<div class="topic ${s.id===current?'active':''}" onclick="current='${s.id}';render()"><b>${esc(s.name)}</b><br><small>${s.cr.length} CR · ${s.adr.length} ADR</small></div>`).join("")}
function renderMain(){let s=subject(),all=[...s.cr,...s.adr],dec=all.flatMap(x=>x.decisions||[]),act=all.flatMap(x=>x.actions||[]),ris=all.flatMap(x=>x.risques||[]);subjectTitle.textContent=s.name;subjectSummary.textContent=s.summary||"";kCr.textContent=s.cr.length;kAdr.textContent=s.adr.length;kDecision.textContent=dec.length;kAction.textContent=act.length;kRisk.textContent=ris.length;summaryContent.innerHTML=`<h3>En une phrase</h3><p>${esc(s.summary||"Non renseigné")}</p><h3>Points importants</h3>${list(all.flatMap(x=>x.pointsAbordes||[]).slice(0,8))}<h3>Dernières décisions</h3>${list(dec.map(d=>d.decision||d).slice(0,6))}<h3>Actions ouvertes</h3>${list(act.map(a=>a.action||a).slice(0,6))}`;crList.innerHTML=s.cr.length?s.cr.map((x,i)=>item(x,"cr",i)).join(""):"<p>Aucun CR.</p>";adrList.innerHTML=s.adr.length?s.adr.map((x,i)=>item(x,"adr",i)).join(""):"<p>Aucun ADR.</p>";decisionTable.innerHTML=table(["Source","Décision","Impact","Statut"],all.flatMap(x=>(x.decisions||[]).map(d=>[x.titre,d.decision||d,d.impact||"",d.statut||""])));actionTable.innerHTML=table(["Source","Action","Responsable","Échéance","Statut"],all.flatMap(x=>(x.actions||[]).map(a=>[x.titre,a.action||a,a.responsable||"",a.echeance||"",a.statut||"À faire"])));riskTable.innerHTML=table(["Source","Risque","Impact","Statut"],all.flatMap(x=>(x.risques||[]).map(r=>[x.titre,r.risque||r,r.impact||"",r.statut||""])))}
function item(x,t,i){return `<div class="item" onclick="openEdit('${t}',${i})"><h3>${esc(x.date||"Date ?")} — ${esc(x.titre)}</h3><p>${esc((x.objectif||x.compteRendu||"").slice(0,300))}</p><small>${(x.decisions||[]).length} décisions · ${(x.actions||[]).length} actions · ${(x.risques||[]).length} risques</small></div>`}
function list(arr){return arr.length?`<ul>${arr.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:"<p>Aucun élément.</p>"}function table(h,rows){if(!rows.length)return"<p>Aucun élément.</p>";return`<table><tr>${h.map(x=>`<th>${esc(x)}</th>`).join("")}</tr>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c||"")}</td>`).join("")}</tr>`).join("")}</table>`}
function tab(id,b){document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.getElementById(id).classList.add("active");b.classList.add("active")}function openAdd(){addModal.classList.remove("hidden")}function closeAdd(){addModal.classList.add("hidden");jsonBox.value=""}
function addJson(){try{let raw=jsonBox.value.trim().replace(/^```json/i,"").replace(/^```/i,"").replace(/```$/i,"").trim();subject()[jsonType.value].unshift(norm(JSON.parse(raw)));save();closeAdd();render()}catch(e){alert("JSON invalide : "+e.message)}}function openManual(){edit={type:"cr",index:null};fill(norm({titre:"",date:new Date().toISOString().slice(0,10)}));editModal.classList.remove("hidden")}function openEdit(t,i){edit={type:t,index:i};fill(subject()[t][i]);editModal.classList.remove("hidden")}
function fill(x){eTitle.value=x.titre||"";eDate.value=x.date||"";eParticipants.value=(x.participants||[]).join(", ");eSummary.value=x.objectif||"";eCR.value=x.compteRendu||"";eDecisions.value=(x.decisions||[]).map(d=>d.decision||d).join("\n");eActions.value=(x.actions||[]).map(a=>a.action||a).join("\n");eRisks.value=(x.risques||[]).map(r=>r.risque||r).join("\n")}
function read(){return norm({titre:eTitle.value,date:eDate.value,participants:eParticipants.value,objectif:eSummary.value,compteRendu:eCR.value,decisions:lines(eDecisions).map(x=>({decision:x})),actions:lines(eActions).map(x=>({action:x,statut:"À faire"})),risques:lines(eRisks).map(x=>({risque:x,statut:"À surveiller"}))})}function saveEdit(){let x=read();if(edit.index===null)subject()[edit.type].unshift(x);else subject()[edit.type][edit.index]=x;save();closeEdit();render()}function deleteEdit(){if(edit.index!==null&&confirm("Supprimer ?")){subject()[edit.type].splice(edit.index,1);save();closeEdit();render()}}function closeEdit(){editModal.classList.add("hidden");edit={type:null,index:null}}function lines(el){return el.value.split("\n").map(x=>x.trim()).filter(Boolean)}
function editSubjectSummary(){let v=prompt("Synthèse du sujet :",subject().summary||"");if(v!==null){subject().summary=v;save();render()}}function newTopic(){let name=prompt("Nom du sujet :");if(!name)return;let id="s"+Date.now();data.subjects.push({id,name,summary:"",cr:[],adr:[]});current=id;save();render()}
function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="po_assistant_v4_sauvegarde.json";a.click()}function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=ev=>{data=migrate(JSON.parse(ev.target.result));current=data.subjects[0]?.id;save();render()};r.readAsText(f)}
function renderSearch(){if(!searchInput)return;let q=(searchInput.value||"").toLowerCase();if(!q){searchResults.innerHTML="<p>Saisir un mot-clé.</p>";return}let rows=[];data.subjects.forEach(s=>["cr","adr"].forEach(t=>s[t].forEach(x=>{if(JSON.stringify(x).toLowerCase().includes(q))rows.push([s.name,t.toUpperCase(),x.date,x.titre,(x.compteRendu||x.objectif||"").slice(0,180)])})));searchResults.innerHTML=table(["Sujet","Type","Date","Titre","Extrait"],rows)}function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
render();
</script></body></html>
